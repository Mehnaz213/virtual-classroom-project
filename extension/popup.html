<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Focus Mate Extension</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 8px;
        padding: 4px;
        width: 280px;
      }
      h3 {
        margin: 0 0 12px 0;
        color: #1e40af;
      }
      label {
        display: block;
        font-size: 12px;
        margin-top: 8px;
        font-weight: 500;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 2px;
        padding: 4px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
      }
      button {
        margin-top: 10px;
        width: 100%;
        padding: 6px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 500;
      }
      #save {
        background: #1e40af;
        color: white;
      }
      #save:hover {
        background: #1e3a8a;
      }
      #clearConfig {
        background: #6b7280;
        color: white;
      }
      #clearConfig:hover {
        background: #4b5563;
      }
      .lock-mode {
        margin-top: 12px;
        padding: 8px;
        background: #fef3c7;
        border-radius: 4px;
        border: 1px solid #fbbf24;
      }
      .lock-mode label {
        display: flex;
        align-items: center;
        margin: 0;
      }
      .lock-mode input[type="checkbox"] {
        width: auto;
        margin-right: 6px;
      }
      .status {
        margin-top: 8px;
        padding: 6px;
        font-size: 11px;
        border-radius: 4px;
        background: #f3f4f6;
      }
      .status.success {
        background: #d1fae5;
        color: #065f46;
      }
      .status.error {
        background: #fee2e2;
        color: #991b1b;
      }
      .stats {
        margin-top: 8px;
        padding: 6px;
        background: #eff6ff;
        border-radius: 4px;
        font-size: 11px;
      }
      .stats div {
        margin: 2px 0;
      }
    </style>
  </head>
  <body>
    <h3>Focus Mate Extension</h3>
    
    <label>
      API Base URL
      <input id="apiBase" placeholder="http://localhost:8000/api" />
    </label>
    
    <label>
      JWT Token (vc_token)
      <input id="token" type="password" placeholder="Paste access token" />
    </label>
    
    <label>
      Session ID
      <input id="sessionId" type="number" placeholder="e.g., 1" />
    </label>
    
    <label>
      Attendance ID
      <input id="attendanceId" type="number" placeholder="e.g., 1" />
    </label>
    
    <button id="save">Save Configuration</button>
    <button id="clearConfig">Clear Configuration</button>
    
    <div class="lock-mode">
      <label>
        <input type="checkbox" id="lockMode" />
        <span>Lock Mode (Block tab switches)</span>
      </label>
    </div>
    
    <div class="stats" id="stats">
      <div><strong>Tab Switches:</strong> <span id="tabCount">0</span></div>
      <div><strong>Lock Violations:</strong> <span id="lockViolations">0</span></div>
    </div>
    
    <div class="status" id="status">Not configured</div>
    
    <script src="popup.js"></script>
  </body>
</html>
